                                        - strong [ref=e1372]: "#DataCleaning"
                                      - text: and manipulation is 90% of what you will do
                                      - text: 3. Build skills in
                                      - link "#DataVisualization" [ref=e1373]:
                                        - /url: https://www.linkedin.com/search/results/all/?keywords=%23datavisualization&origin=HASH_TAG_FROM_FEED
                                        - strong [ref=e1375]: "#DataVisualization"
                                      - text: "- This is a cornerstone of understanding, yet many ML specialists can't do it"
                                      - text: 4. Skip over buzzwords until after you learn fundamentals - AI, Data Science, ML - You'll get to these after you learn stats, data manipulation / data cleaning, & data viz
                                      - text: And if you are learning data science and feel as lost as I did when I first started, then I can help.
                                      - text: I put together a free 40-minute webinar that is value-packed with the 10 most important secrets that would have saved me countless hours.
