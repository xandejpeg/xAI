                                      - paragraph [ref=e1007]: Gerente de Recursos Humanos | Expertise em Folha de Pagamento, eSocial, Legislação Trabalhista | Gestão Orçamentária | Liderança Humanizada com Foco em Pessoas | Processos | Resultados
