                                      - text: "I think the message in Data Science needs to be: Don't believe everything you read."
                                      - text: I'd like to thank Rafael Nicolas Fermin Cota for pointing me to this modified graphic from a recent Harvard Business Review article on "Prioritizing Which Data Skills Your Company Needs".
                                      - text: You hear Harvard Business Review, & you think this must be legit. Well, in this case, they dropped the ball.
                                      - text: "If you're coming up with an educational plan for your org in 2023, here are some tips:"
                                      - text: 1. Focus on
                                      - link "#stats" [ref=e1364]:
