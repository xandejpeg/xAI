                        - generic [ref=e354]: "Responsável pela tecnologia do time tributário em escritório especializado em recuperação de créditos fiscais, auditoria (PIS, COFINS, INSS via SPED) e consultoria Zona Franca de Manaus. ═══ EASY SOCIAL — Hub de comunicação eSocial ═══ Produto principal. Hub geral para todos os eventos do eSocial, com foco em identificar e RESOLVER inconsistências em lote — diferencial frente a concorrentes que apenas validam. Escopo: • ~200 mil eventos por ano em média por empresa • Atende dezenas de empresas • Trata S-2210 (acidentes), S-1200/S-1210 (folha + IRRF), entre outros • Análise de Rubricas integrando eSocial + legislação vigente • Automatização de envios e consultas de retificações para IRRF ano-base 2025 Engenharia: • Backend Python / FastAPI • SOAP com certificado digital A1 (.pfx) mantido LOCAL na máquina do cliente (sem upload) • Pipeline identificação → resolução em lote • Lida com retificações múltiplas (versão dtRecibido mais recente) ═══ REALPREV — eSocial S-2500 (Founder + Dev Principal) ═══ Sistema completo de envio de eventos trabalhistas (processo trabalhista) ao governo federal. Marca registrada no INPI. Cliente pagante em produção no setor financeiro. Processo manual de dias → envio automatizado em minutos. SOAP + A1 local + signxml. RBAC, cálculo SELIC/INPC/IRRF, dashboard psutil, relatórios PDF/Excel/CSV/DCTF-Web. Integrações SERPRO, Datajud/CNJ, eCAC. Stack: Python · Zeep · signxml · PostgreSQL ═══ MCAPBOT — Automação de Rotinas Fiscais ═══ Mapeei processos manuais e priorizei por frequência/tempo. Automação web de 3 rotinas: e-CAC, ReceitaNet, e-Social. Reduziu horas de trabalho manual por semana. Stack: Python"
